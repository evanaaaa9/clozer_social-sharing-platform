<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Clozer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <a href="/" class="logo" style="display:block;margin-bottom:2rem;text-decoration:none;">Cloze<span>r</span></a>
  <h2 class="auth-title">Create your account</h2>
  <p class="auth-sub">Start sharing intentionally</p>

  <div id="error-msg" class="error-banner" style="display:none;"></div>

  <form id="register-form" class="auth-form">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your name" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
    </div>
    <button type="submit" class="btn-big full-width" id="submit-btn">Create account</button>
  </form>

  <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
</div>

<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    btn.textContent = 'Creating account...';
    btn.disabled = true;
    errEl.style.display = 'none';

    try {
      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) window.location.href = data.redirect;
      else { errEl.textContent = data.error; errEl.style.display = 'block'; }
    } catch {
      errEl.textContent = 'Something went wrong. Try again.';
      errEl.style.display = 'block';
    }
    btn.textContent = 'Create account';
    btn.disabled = false;
  });
</script>
</body>
</html>
