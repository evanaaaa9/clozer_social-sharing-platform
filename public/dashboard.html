<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Clozer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">

<nav class="dash-nav">
  <div class="logo">Cloze<span>r</span></div>
  <div class="nav-cta">
    <span id="user-greeting" class="user-greeting"></span>
    <a href="/logout" class="btn-outline">Log out</a>
  </div>
</nav>

<div class="dash-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-header">
        <span>My Circles</span>
        <button class="icon-btn" id="new-circle-btn" title="New circle">+</button>
      </div>
      <ul id="circles-list" class="circles-list">
        <li class="circle-item active" data-id="all">
          <span class="circle-dot" style="background:#888;"></span> All circles
        </li>
      </ul>
    </div>
  </aside>

  <!-- MAIN FEED -->
  <main class="feed-main">

    <!-- Compose -->
    <div class="compose-card">
      <textarea id="post-content" placeholder="What's on your mind?" maxlength="1000"></textarea>
      <div class="compose-footer">
        <div class="compose-circles" id="compose-circles">
          <span class="compose-label">Share to:</span>
          <div id="circle-checkboxes"></div>
        </div>
        <button class="btn-primary" id="post-btn">Post</button>
      </div>
    </div>

    <!-- Feed filter pills -->
    <div class="feed-filters" id="feed-filters">
      <button class="pill active" data-id="all">All circles</button>
    </div>

    <!-- Posts -->
    <div id="post-feed"></div>
  </main>
</div>

<!-- NEW CIRCLE MODAL -->
<div id="circle-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3>New circle</h3>
      <button class="modal-close" id="close-modal">✕</button>
    </div>
    <div class="form-group">
      <label>Circle name</label>
      <input type="text" id="circle-name" placeholder="e.g. Close Friends" />
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-picker">
        <span class="color-swatch active" data-color="#2a7c5a" style="background:#2a7c5a;"></span>
        <span class="color-swatch" data-color="#5b4fd8" style="background:#5b4fd8;"></span>
        <span class="color-swatch" data-color="#d85b5b" style="background:#d85b5b;"></span>
        <span class="color-swatch" data-color="#c47d1a" style="background:#c47d1a;"></span>
        <span class="color-swatch" data-color="#1a7fb5" style="background:#1a7fb5;"></span>
        <span class="color-swatch" data-color="#a854a8" style="background:#a854a8;"></span>
      </div>
    </div>
    <button class="btn-big full-width" id="create-circle-btn">Create circle</button>
  </div>
</div>

<!-- ADD MEMBER MODAL -->
<div id="member-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3>Add member to <span id="modal-circle-name"></span></h3>
      <button class="modal-close" id="close-member-modal">✕</button>
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="member-email" placeholder="friend@example.com" />
    </div>
    <div id="member-error" class="error-banner" style="display:none;"></div>
    <button class="btn-big full-width" id="add-member-btn">Add member</button>
    <div id="current-members" style="margin-top:1.5rem;"></div>
  </div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
