<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Clozer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-page">

<nav class="dash-nav">
  <a href="/" class="logo">Cloze<span>r</span></a>
  <div class="nav-cta">
    <a href="/dashboard" class="btn-outline">Dashboard</a>
    <a href="/logout" class="btn-outline">Log out</a>
  </div>
</nav>

<div class="profile-container">
  <div class="profile-card">
    <div class="profile-avatar" id="profile-avatar"></div>
    <div class="profile-info">
      <h2 id="profile-name"></h2>
      <p id="profile-email"></p>
      <p id="profile-bio"></p>
      <p id="profile-joined"></p>
    </div>
    <button class="btn-primary" id="edit-btn">Edit Profile</button>
  </div>

  <div class="edit-form" id="edit-form" style="display:none;">
    <h3>Edit Profile</h3>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="edit-name" />
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea id="edit-bio" maxlength="160" rows="3" 
        style="resize:none;"></textarea>
    </div>
    <div style="display:flex;gap:1rem;margin-top:1rem;">
      <button class="btn-big" id="save-btn">Save</button>
      <button class="btn-outline" id="cancel-btn">Cancel</button>
    </div>
  </div>

  <div class="profile-posts">
    <h3 style="margin-bottom:1rem;">My Posts</h3>
    <div id="my-posts"></div>
  </div>
</div>

<script>
async function loadProfile() {
  const res = await fetch('/profile/me');
  const data = await res.json();
  
  document.getElementById('profile-avatar').textContent = 
    data.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('profile-avatar').style.background = '#2a7c5a';
  document.getElementById('profile-name').textContent = data.name;
  document.getElementById('profile-email').textContent = data.email;
  document.getElementById('profile-bio').textContent = 
    data.bio || 'No bio yet.';
  document.getElementById('profile-joined').textContent = 
    'Joined ' + new Date(data.createdAt).toLocaleDateString('en-IN', 
    {month:'long', year:'numeric'});
  document.getElementById('edit-name').value = data.name;
  document.getElementById('edit-bio').value = data.bio || '';
}

async function loadMyPosts() {
  const res = await fetch('/profile/myposts');
  const posts = await res.json();
  const container = document.getElementById('my-posts');
  if (!posts.length) {
    container.innerHTML = '<p style="color:var(--gray-400);">No posts yet.</p>';
    return;
  }
  container.innerHTML = posts.map(p => `
    <div class="post-card">
      <div class="post-body">${p.content}</div>
      <div class="post-circles-row" style="margin-top:0.5rem;">
        ${p.circles.map(c => 
          `<span class="post-circle-tag" 
            style="background:${c.color}22;color:${c.color}">
            ${c.name}</span>`).join('')}
      </div>
      <div style="font-size:0.78rem;color:var(--gray-400);margin-top:0.5rem;">
        ${new Date(p.createdAt).toLocaleDateString()}
      </div>
    </div>
  `).join('');
}

document.getElementById('edit-btn').addEventListener('click', () => {
  document.getElementById('edit-form').style.display = 'block';
  document.getElementById('edit-btn').style.display = 'none';
});

document.getElementById('cancel-btn').addEventListener('click', () => {
  document.getElementById('edit-form').style.display = 'none';
  document.getElementById('edit-btn').style.display = 'block';
});

document.getElementById('save-btn').addEventListener('click', async () => {
  const name = document.getElementById('edit-name').value.trim();
  const bio = document.getElementById('edit-bio').value.trim();
  const res = await fetch('/profile/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, bio })
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('edit-form').style.display = 'none';
    document.getElementById('edit-btn').style.display = 'block';
    loadProfile();
  }
});

loadProfile();
loadMyPosts();
</script>
</body>
</html>
